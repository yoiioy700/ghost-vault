<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100" height="100">
  <!-- Ghost Outline -->
  <path
    d="M 50 10
       C 70 10, 80 20, 80 40
       V 65
       Q 80 75, 85 85
       Q 67.5 72, 50 85
       Q 32.5 72, 15 85
       Q 20 75, 20 65
       V 40
       C 20 20, 30 10, 50 10
       Z"
    stroke="white"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Eyes -->
  <circle cx="36" cy="30" r="4.5" fill="white" />
  <circle cx="64" cy="30" r="4.5" fill="white" />
  <!-- Safe Dial: Outer Ring -->
  <circle cx="50" cy="62" r="16" stroke="white" stroke-width="5" />
  <!-- Safe Dial: Inner Knob -->
  <circle cx="50" cy="62" r="6" stroke="white" stroke-width="3" />
  <circle cx="50" cy="62" r="2.5" fill="white" />
  <!-- Safe Dial: Tick Marks -->
  <circle
    cx="50"
    cy="62"
    r="10.5"
    stroke="white"
    stroke-width="3.5"
    pathLength="160"
    stroke-dasharray="2.5 7.5"
    stroke-dashoffset="1.25"
  />
  <!-- Safe Dial: Pointer -->
  <path d="M50 42 L45 34 L55 34 Z" fill="white" stroke="white" stroke-linejoin="round" stroke-width="1" />
</svg>
